# /etc/nginx/conf.d/condorid.conf
#
# Single virtual host that serves three sites from one NGINX:
#   /                       → the HQ landing page
#   /oakomolafe6433Logo     → the corporate logo site (a virtual directory)
#   /oakomolafe6433Music    → the music site (a virtual directory)
#
# I removed the default `server { ... }` block from /etc/nginx/nginx.conf
# before installing this file so the default-page didn't shadow the
# HQ site at /.

server {
    listen      80;
    server_name _;

    # Main site root
    root  /usr/share/nginx/oakomolafe6433HQ;
    index index.html;

    # Logo virtual directory — served from a sibling folder
    location /oakomolafe6433Logo {
        root /usr/share/nginx;
    }

    # Music virtual directory — served from a sibling folder
    location /oakomolafe6433Music {
        root /usr/share/nginx;
    }
}
